# Blueprint: set Build Command to `npm install && npm run build` if not using this file.
# postinstall also runs `next build` when RENDER=true (fallback if dashboard is only `npm install`).

services:
  - type: web
    name: carsofnovi
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
